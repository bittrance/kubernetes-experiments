apiVersion: v1
kind: Namespace
metadata:
  name: rbac-example
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rbac-example
  namespace: rbac-example
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - events
      - pods/log
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
      - cronjobs/status
    verbs:
      - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rbac-example
  namespace: rbac-example
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rbac-example
subjects:
  - kind: ServiceAccount
    name: rbac-example
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbac-example
  namespace: rbac-example
