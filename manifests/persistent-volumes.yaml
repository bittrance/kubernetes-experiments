apiVersion: v1
kind: Namespace
metadata:
  name: persistent-volumes
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: persistent-volumes
  labels:
    app: nginx
spec:
  type: LoadBalancer
  ports:
    - port: 80
      name: web
  selector:
    app.kuberntes.io/name: nginx
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
  namespace: persistent-volumes
spec:
  selector:
    matchLabels:
      app.kuberntes.io/name: nginx
  serviceName: nginx
  replicas: 3
  template:
    metadata:
      labels:
        app.kuberntes.io/name: nginx
    spec:
      containers:
        - name: nginx
          image: registry.k8s.io/nginx-slim:0.24
          ports:
            - containerPort: 80
              name: web
          volumeMounts:
            - name: www
              mountPath: /usr/share/nginx/html
  volumeClaimTemplates:
    - metadata:
        name: www
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: andqvi-test
        resources:
          requests:
            storage: 1Gi
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
