apiVersion: v1
kind: Namespace
metadata:
  name: hello-backend
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: hello-backend
  namespace: hello-backend
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-backend
  namespace: hello-backend
spec:
  parentRefs:
    - name: hello-backend
      port: 80
  rules:
    - backendRefs:
        - name: hello-backend
          port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-backend
  namespace: hello-backend
spec:
  selector:
    app: hello-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-backend
  namespace: hello-backend
  labels:
    app: hello-backend
spec:
  selector:
    matchLabels:
      app: hello-backend
  template:
    metadata:
      labels:
        app: hello-backend
    spec:
      containers:
        - name: caddy
          image: caddy:2.9.1-alpine
          command:
            - caddy
            - respond
            - --listen
            - :8080
            - --body
            - Hello backend!
            - --access-log
          ports:
            - containerPort: 8080

